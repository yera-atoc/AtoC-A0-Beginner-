<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AtoC · A0 Урок 1: Алфавит и</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap');
:root{--nv:#0c1e34;--nv2:#162840;--tl:#00c9a7;--tl2:#00a98f;--tp:#e0faf5;--gd:#ffb830;--gd2:#e09a00;--gp:#fff8e1;--rd:#ff4d6d;--rp:#ffe0e8;--gr:#06d6a0;--grp:#e0fdf4;--pu:#845ec2;--pp:#f0ebff;--bg:#f2f5ff;--wh:#fff;--tx:#0c1e34;--mu:#5a7184;--br:#e2eaf5}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:90px;overflow-x:hidden}
/* HEADER */
.hdr{background:var(--nv);border-bottom:3px solid var(--gd);position:sticky;top:0;z-index:200;padding:0 16px}
.hdr-in{max-width:700px;margin:0 auto;height:54px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px}
.logo-b{background:var(--gd);color:var(--nv);font-weight:900;font-size:12px;padding:4px 10px;border-radius:7px;letter-spacing:.02em}
.logo-t{color:#fff;font-weight:800;font-size:14px}
.hdr-r{display:flex;align-items:center;gap:7px}
.str-b{display:flex;align-items:center;gap:4px;background:rgba(255,184,48,.14);border:1px solid rgba(255,184,48,.3);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:800;color:var(--gd)}
.bk{color:rgba(255,255,255,.55);font-size:11px;font-weight:700;text-decoration:none;padding:5px 10px;border:1px solid rgba(255,255,255,.15);border-radius:7px}
.bk:hover{background:rgba(255,255,255,.08);color:#fff}
/* HERO */
.hero{background:linear-gradient(135deg,var(--nv) 0%,var(--nv2) 100%);position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 8% 50%,rgba(0,201,167,.13) 0%,transparent 60%),radial-gradient(ellipse at 92% 15%,rgba(255,184,48,.1) 0%,transparent 50%);pointer-events:none}
.hero-in{position:relative;max-width:700px;margin:0 auto;padding:30px 16px 22px}
.chips{display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap}
.chip{font-size:10px;font-weight:800;padding:3px 11px;border-radius:20px;letter-spacing:.06em}
.ct{background:rgba(0,201,167,.18);border:1px solid rgba(0,201,167,.35);color:#5de8c8}
.cg{background:rgba(255,184,48,.18);border:1px solid rgba(255,184,48,.35);color:var(--gd)}
.hero-h{font-size:clamp(20px,5vw,32px);font-weight:900;color:#fff;line-height:1.2;margin-bottom:8px;letter-spacing:-.02em}
.hero-h .ac{color:var(--gd)}
.hero-s{font-size:13px;color:rgba(255,255,255,.55);line-height:1.7;margin-bottom:14px;max-width:500px}
.eqs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.eq{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:6px 10px;text-align:center}
.eq-l{color:rgba(255,255,255,.38);font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:2px}
.eq-v{color:#fff;font-weight:900;font-size:12px;font-family:"DM Mono",monospace}
.goal{background:rgba(0,201,167,.1);border:1px solid rgba(0,201,167,.22);border-radius:11px;padding:12px 14px;display:flex;gap:9px;align-items:flex-start}
.goal i{font-size:18px;flex-shrink:0}
.goal p{font-size:12px;color:rgba(255,255,255,.78);line-height:1.6}
.goal p strong{color:#5de8c8}
.pb-w{height:5px;background:rgba(255,255,255,.08)}
.pb{height:5px;background:linear-gradient(90deg,var(--tl),var(--gd));transition:width .7s ease}
/* TABS */
.tabs-w{background:#fff;border-bottom:2px solid var(--br);position:sticky;top:54px;z-index:100}
.tabs{max-width:700px;margin:0 auto;display:flex;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 15px;font-size:11px;font-weight:800;color:var(--mu);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;flex-shrink:0}
.tab:hover{color:var(--tl)}
.tab.on{color:var(--tl);border-bottom-color:var(--tl)}
/* CONTENT */
.cnt{max-width:700px;margin:0 auto;padding:20px 16px}
.sec{display:none}.sec.on{display:block;animation:sUp .3s ease}
@keyframes sUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
/* CARDS */
.card{background:#fff;border:2px solid var(--br);border-radius:18px;padding:20px;margin-bottom:13px;transition:border-color .2s}
.card:hover{border-color:var(--tl)}
.c-ti{font-size:15px;font-weight:900;margin-bottom:11px;display:flex;align-items:center;gap:8px}
.ci{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ci-t{background:var(--tp)}.ci-g{background:var(--gp)}.ci-p{background:var(--pp)}.ci-r{background:var(--rp)}
.tip{background:var(--tp);border:1.5px solid rgba(0,201,167,.22);border-radius:11px;padding:12px 14px;margin:11px 0;font-size:13px;line-height:1.7}
.tip .tl{font-weight:900;color:var(--tl2);font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.warn{background:var(--gp);border:1.5px solid rgba(255,184,48,.28);border-radius:11px;padding:12px 14px;margin:11px 0;font-size:13px;line-height:1.7}
.warn .wl{font-weight:900;color:var(--gd2);font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.er{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--br);font-size:13px}
.er:last-child{border-bottom:none}
.er-e{font-weight:800;color:var(--nv);min-width:150px}
.er-r{color:var(--mu)}
.spk{background:none;border:none;cursor:pointer;font-size:14px;padding:1px 3px;transition:transform .15s;vertical-align:middle;margin-left:3px}
.spk:hover{transform:scale(1.2)}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;border-radius:12px;overflow:hidden;margin:11px 0}
.tbl th{background:var(--nv);color:#fff;padding:10px 13px;text-align:left;font-size:11px;font-weight:700}
.tbl td{padding:10px 13px;font-size:13px;border-bottom:1px solid var(--br)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:#fafbff}
.tbl .en{font-weight:800;color:var(--nv);font-family:"DM Mono",monospace}
.tbl .sh{color:var(--tl2);font-family:"DM Mono",monospace}
/* SENTENCE BOX */
.sb{background:var(--bg);border:2px solid var(--br);border-radius:11px;padding:14px;margin:11px 0}
.sb-p{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:7px}
.sb-b{padding:6px 12px;border-radius:7px;font-weight:800;font-size:13px}
.sbs{background:#dbeafe;color:#1e40af}
.sbv{background:var(--tp);color:var(--tl2)}
.sbo{background:var(--gp);color:#92400e}
.sb-r{font-size:14px;font-weight:800;color:var(--nv);margin-bottom:3px}
.sb-ru{font-size:12px;color:var(--mu)}
/* QUIZ */
.qc{background:#fff;border:2px solid var(--br);border-radius:18px;padding:20px;margin-bottom:13px}
.q-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.q-n{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mu)}
.q-t{font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px}
.tg{background:var(--pp);color:var(--pu)}.tv{background:var(--tp);color:var(--tl2)}
.q-tx{font-size:15px;font-weight:800;color:var(--nv);margin-bottom:13px;line-height:1.5}
.q-s{font-size:18px;font-weight:800;text-align:center;padding:12px;background:var(--bg);border-radius:11px;margin-bottom:13px;font-family:"DM Mono",monospace;color:var(--nv);border:2px dashed var(--br)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt{background:var(--bg);border:2px solid var(--br);border-radius:11px;padding:12px 13px;font-size:13px;font-weight:800;font-family:"Nunito",sans-serif;color:var(--tx);cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:6px}
.opt:hover:not(:disabled){border-color:var(--tl);background:var(--tp);transform:translateY(-1px)}
.opt:disabled{cursor:default}
.opt.ok{border-color:var(--gr);background:var(--grp);color:#065f46}
.opt.no{border-color:var(--rd);background:var(--rp);color:#991b1b;animation:shake .4s ease}
.ol{width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.expl{background:linear-gradient(135deg,var(--tp),#f0fff8);border:1.5px solid rgba(0,201,167,.22);border-radius:11px;padding:12px 14px;margin-top:11px;font-size:13px;line-height:1.7;display:none}
.expl.on{display:block;animation:sUp .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
/* SCORE */
.sc{background:linear-gradient(135deg,var(--nv),var(--nv2));border-radius:20px;padding:34px 22px;text-align:center;display:none;margin-top:14px;border:2px solid rgba(255,184,48,.25)}
.sc.on{display:block;animation:sUp .4s ease}
.sc-em{font-size:50px;display:block;margin-bottom:9px}
.sc-n{font-size:46px;font-weight:900;color:var(--gd);font-family:"DM Mono",monospace;line-height:1;margin-bottom:5px}
.sc-sub{color:rgba(255,255,255,.42);font-size:12px;margin-bottom:15px}
.sc-bw{background:rgba(255,255,255,.1);border-radius:100px;height:8px;max-width:270px;margin:0 auto 15px;overflow:hidden}
.sc-b{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--tl),var(--gd));transition:width 1.2s ease}
.sc-m{color:rgba(255,255,255,.78);font-size:14px;font-weight:700;margin-bottom:18px;line-height:1.6;padding:0 8px}
.sc-bs{display:flex;justify-content:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.sc-badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 13px;text-align:center}
.sb-ic{font-size:18px;display:block;margin-bottom:3px}
.sb-l{color:rgba(255,255,255,.45);font-size:9px;font-weight:700;display:block}
.sb-v{color:#fff;font-weight:900;font-size:12px}
.sc-btn{background:linear-gradient(135deg,var(--tl),var(--tl2));color:#fff;border:none;border-radius:12px;padding:13px 28px;font-size:14px;font-weight:900;font-family:"Nunito",sans-serif;cursor:pointer;transition:all .2s}
.sc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,201,167,.4)}
/* VOCAB */
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:8px;margin-top:11px}
.vi{background:var(--bg);border:1.5px solid var(--br);border-radius:11px;padding:10px 12px;transition:all .2s}
.vi:hover{border-color:var(--tl);transform:translateY(-1px)}
.vi-e{font-weight:900;font-size:13px;color:var(--nv)}
.vi-i{font-size:10px;color:var(--tl2);font-family:"DM Mono",monospace;margin:2px 0}
.vi-r{font-size:11px;color:var(--mu)}
/* TIP CARD */
.tc{background:#fff;border:2px solid var(--br);border-left:5px solid var(--tl);border-radius:12px;padding:15px 17px;margin-bottom:11px}
.tc h4{font-size:13px;font-weight:900;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.tc p{font-size:12px;color:var(--mu);line-height:1.7}
.tc.gd{border-left-color:var(--gd)}
/* NEXT BTN */
.nb{display:block;width:100%;background:linear-gradient(135deg,var(--tl),var(--tl2));color:#fff;border:none;border-radius:12px;padding:15px;font-size:14px;font-weight:900;font-family:"Nunito",sans-serif;cursor:pointer;margin-top:14px;box-shadow:0 4px 14px rgba(0,201,167,.28);transition:all .2s;text-align:center;text-decoration:none}
.nb:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,201,167,.38)}
/* ALPHA GRID */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px;margin-top:11px}
.lc{background:var(--bg);border:2px solid var(--br);border-radius:10px;padding:9px 6px;text-align:center;cursor:pointer;transition:all .15s}
.lc:hover,.lc.on{border-color:var(--tl);background:var(--tp);transform:translateY(-2px)}
.lc-b{font-size:19px;font-weight:900;color:var(--nv);line-height:1}
.lc-s{font-size:9px;color:var(--tl2);font-family:"DM Mono",monospace;font-weight:800;margin-top:2px}
/* FLASHCARD */
.fw{perspective:1000px;margin-bottom:16px}
.fc{width:100%;min-height:148px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;border-radius:16px}
.fc.fl{transform:rotateY(180deg)}
.fc-f,.fc-b{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.fc-f{background:linear-gradient(135deg,var(--nv),var(--nv2));border:2px solid rgba(255,255,255,.07)}
.fc-b{background:linear-gradient(135deg,var(--tl2),var(--tl));transform:rotateY(180deg)}
.fc-lt{font-size:58px;font-weight:900;color:#fff;line-height:1;margin-bottom:5px}
.fc-ht{font-size:11px;color:rgba(255,255,255,.38)}
.fc-sn{font-size:24px;font-weight:900;color:#fff;font-family:"DM Mono",monospace;margin-bottom:5px}
.fc-wd{font-size:14px;font-weight:800;color:rgba(255,255,255,.9);margin-bottom:3px;cursor:pointer}
.fc-tr{font-size:12px;color:rgba(255,255,255,.68)}
.fcn{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:18px}
.fcb{background:#fff;border:2px solid var(--br);border-radius:8px;padding:8px 16px;font-size:12px;font-weight:800;font-family:"Nunito",sans-serif;color:var(--tx);cursor:pointer;transition:all .15s}
.fcb:hover{border-color:var(--tl);color:var(--tl)}
.fcc{font-family:"DM Mono",monospace;font-size:12px;color:var(--mu);min-width:44px;text-align:center}
/* GAME HUD */
.hud{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:rgba(13,27,42,.07);border-radius:12px;margin-bottom:13px;gap:7px}
.lv-r{display:flex;align-items:center;gap:3px;background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.22);border-radius:20px;padding:5px 11px}
.lv-r span{font-size:15px;transition:all .3s}
.lv-r span.lost{opacity:.18;filter:grayscale(1);transform:scale(.75);animation:hpop .4s ease}
@keyframes hpop{0%{transform:scale(1.4)}100%{transform:scale(.75);opacity:.18}}
.tr{position:relative;width:42px;height:42px;flex-shrink:0}
.tr svg{transform:rotate(-90deg)}
.tr .tb{fill:none;stroke:rgba(0,0,0,.09);stroke-width:3}
.tr .tf{fill:none;stroke:var(--tl);stroke-width:3;stroke-linecap:round;stroke-dasharray:113;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .3s}
.tr .tn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--nv);font-family:"DM Mono",monospace}
.xp-h{display:flex;align-items:center;gap:4px;background:rgba(132,94,194,.11);border:1px solid rgba(132,94,194,.24);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:800;color:#c4aaff}
/* GAMEOVER */
.go{position:fixed;inset:0;background:rgba(12,20,34,.92);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px;backdrop-filter:blur(10px)}
.go.on{display:flex;animation:sUp .3s ease}
.go-i{font-size:68px;margin-bottom:16px}
.go-h{font-size:25px;font-weight:900;color:#fff;margin-bottom:9px}
.go-s{color:rgba(255,255,255,.6);font-size:14px;margin-bottom:24px;line-height:1.7}
.go-b{background:linear-gradient(135deg,#ff4d6d,#ff6b35);color:#fff;border:none;border-radius:13px;padding:14px 32px;font-size:14px;font-weight:900;font-family:"Nunito",sans-serif;cursor:pointer;margin-bottom:9px;width:100%;max-width:265px}
.go-b2{background:rgba(255,255,255,.1);color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.2);border-radius:13px;padding:11px 24px;font-size:13px;font-weight:700;font-family:"Nunito",sans-serif;cursor:pointer;width:100%;max-width:265px}
/* RETRY */
.retry{background:linear-gradient(135deg,#ff4d6d,#ff6b35);color:#fff;border-radius:11px;padding:11px 14px;font-size:13px;font-weight:800;display:flex;align-items:center;gap:7px;margin-bottom:12px;animation:sUp .3s ease}
.rb{margin-left:auto;background:#fff;color:#ff4d6d;border:none;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:900;cursor:pointer;font-family:"Nunito",sans-serif}
.sk{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif}
/* TOPIC STATS */
.ts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:11px 0}
.ts-i{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:10px}
.ts-l{font-size:10px;font-weight:800;color:rgba(255,255,255,.42);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.ts-bw{background:rgba(255,255,255,.1);border-radius:100px;height:5px;overflow:hidden;margin-bottom:4px}
.ts-bf{height:100%;border-radius:100px;transition:width .9s ease}
.ts-n{font-size:11px;font-weight:900;color:#fff;font-family:"DM Mono",monospace}
/* XP FLOAT */
@keyframes xpf{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-44px);opacity:0}}
.xpf{position:fixed;font-size:15px;font-weight:900;color:#c4aaff;pointer-events:none;z-index:9999;animation:xpf 1.6s ease forwards;font-family:"DM Mono",monospace}
/* CONFETTI */
@keyframes cf{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
/* TIGER */
@keyframes bob{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-14px) rotate(1.5deg)}}
@keyframes jmp{0%{transform:translateY(0) scale(1)}20%{transform:translateY(-28px) scale(1.1)}50%{transform:translateY(-10px) scale(1.04)}70%{transform:translateY(-22px) scale(1.08)}100%{transform:translateY(0) scale(1)}}
@keyframes shk{0%,100%{transform:translateX(0)}16%{transform:translateX(-10px) rotate(-3deg)}33%{transform:translateX(10px) rotate(3deg)}50%{transform:translateX(-7px)}66%{transform:translateX(7px)}}
@keyframes earL{0%,62%,100%{transform:rotate(0)}67%{transform:rotate(-15deg)}78%{transform:rotate(7deg)}88%{transform:rotate(-5deg)}}
@keyframes earR{0%,70%,100%{transform:rotate(0)}75%{transform:rotate(15deg)}85%{transform:rotate(-7deg)}93%{transform:rotate(5deg)}}
@keyframes blk{0%,44%,53%,100%{transform:scaleY(1)}48%{transform:scaleY(.04)}}
@keyframes twag{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(18deg)}}
@keyframes blsh{0%,100%{opacity:.33}50%{opacity:.52}}
.t-wrap{position:relative;z-index:2;cursor:pointer;animation:bob 4s ease-in-out infinite;filter:drop-shadow(0 20px 40px rgba(0,0,0,.55));transition:transform .15s}
.t-wrap:hover{transform:scale(1.05)!important}
.t-wrap:active{transform:scale(.96)!important}
.t-wrap.happy{animation:jmp .72s cubic-bezier(.36,.07,.19,.97)!important}
.t-wrap.sad{animation:shk .58s ease!important}
.eL{transform-origin:55% 92%;animation:earL 6s ease-in-out infinite}
.eR{transform-origin:45% 92%;animation:earR 6s ease-in-out infinite}
#lL{transform-origin:50% 56%;animation:blk 6.2s ease-in-out infinite}
#lR{transform-origin:50% 56%;animation:blk 6.2s .14s ease-in-out infinite}
.tl-g{transform-origin:0% 0%;animation:twag 1.9s ease-in-out infinite}
.bl{animation:blsh 3s ease-in-out infinite}
/* TIGER BUBBLE */
.tb{position:fixed;bottom:82px;right:82px;background:#fff;border:2.5px solid var(--gd);border-radius:18px 18px 18px 5px;padding:13px 16px;font-size:13px;font-weight:800;color:var(--nv);line-height:1.58;max-width:210px;box-shadow:0 8px 28px rgba(0,0,0,.22);opacity:0;pointer-events:none;z-index:999;transform:scale(.78) translateY(8px);transition:opacity .28s,transform .32s cubic-bezier(.34,1.56,.64,1)}
.tb.on{opacity:1;transform:scale(1) translateY(0)}
.tb::before{content:"";position:absolute;right:-11px;bottom:18px;border:11px solid transparent;border-left-color:var(--gd);border-right:0}

<script>
_S.total=6;_S.lkey='ielts_a0_lesson1';window._cm={1:"B",2:"B",3:"C",4:"C",5:"B",6:"B"};
function initL(){rHUD();setTimeout(()=>stTmr(1),1400);}

// ── VOICE ──
let _v=null;
function _pv(){const vs=window.speechSynthesis.getVoices();if(!vs.length)return;const w=[v=>v.name==='Samantha',v=>v.name==='Google UK English Female',v=>v.name==='Karen',v=>v.name==='Moira',v=>v.name==='Tessa',v=>/aria/i.test(v.name)&&v.lang.startsWith('en'),v=>v.lang==='en-AU',v=>v.lang==='en-GB',v=>v.lang.startsWith('en')];for(const t of w){const f=vs.find(t);if(f){_v=f;return;}}}
if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=_pv;_pv();}
function spk(w,id){if(!window.speechSynthesis)return;const c=String(w).replace(/[^\x00-\x7F]/g,'').trim();if(!c)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(c);u.lang='en-GB';u.rate=0.76;u.pitch=1.35;u.volume=1;if(_v)u.voice=_v;if(id){const el=document.getElementById(id);if(el){el.classList.add('playing');u.onend=u.onerror=()=>el.classList.remove('playing');}}window.speechSynthesis.speak(u);}

// ── TIGER ──
const TM={ok:['🎉 Ура! Правильно!','🔥 Молодец! Так держать!','⚡ Вот это я понимаю!','😄 Ты крутой!','🌟 Отлично!','💥 Попал в точку!'],no:['😅 Ничего, бывает!','💡 Ошибки делают нас умнее!','😏 Это была ловушка!','🤗 Не переживай!'],str:['🔥🔥 ОГОНЬ! Серия!','🚀 Тигрёнок в восторге!','🏆 Не останавливайся!'],st:['👋 Привет! Я Тигрёнок!','😊 Рад тебя видеть!','🐯 Учимся вместе!'],dn:['🏆 Урок пройден!','🎊 Тигрёнок гордится!','🌟 Невероятно!'],tp:['🐯 Привет!','✨ Учись каждый день!','💪 Ты справишься!','🌟 Молодец!','❤️ Верю в тебя!']};

function tFace(type){const bL=document.getElementById('bL'),bR=document.getElementById('bR'),mth=document.getElementById('mth'),tng=document.getElementById('tng'),tngD=document.getElementById('tngD');if(!bL)return;if(type==='happy'){bL.setAttribute('d','M80,112 C96,100 126,100 140,112');bR.setAttribute('d','M160,112 C176,100 206,100 220,112');mth.setAttribute('d','M124,198 C136,216 164,216 176,198');if(tng)tng.style.opacity='1';if(tngD)tngD.style.opacity='1';}else if(type==='sad'){bL.setAttribute('d','M80,122 C96,118 126,120 140,124');bR.setAttribute('d','M160,124 C176,120 206,118 220,122');mth.setAttribute('d','M128,208 C138,200 162,200 172,208');if(tng)tng.style.opacity='0';if(tngD)tngD.style.opacity='0';}else{bL.setAttribute('d','M80,120 C96,108 126,108 140,120');bR.setAttribute('d','M160,120 C176,108 206,108 220,120');mth.setAttribute('d','M126,196 C137,212 163,212 174,196');if(tng)tng.style.opacity='0';if(tngD)tngD.style.opacity='0';}}

// ── SOUND FX ──
function snd(ok){try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);if(ok){o.frequency.setValueAtTime(523,ctx.currentTime);o.frequency.setValueAtTime(659,ctx.currentTime+.1);o.frequency.setValueAtTime(784,ctx.currentTime+.2);g.gain.setValueAtTime(.1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);o.start(ctx.currentTime);o.stop(ctx.currentTime+.4);}else{o.frequency.setValueAtTime(330,ctx.currentTime);o.frequency.setValueAtTime(200,ctx.currentTime+.15);g.gain.setValueAtTime(.08,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);o.start(ctx.currentTime);o.stop(ctx.currentTime+.3);}}catch(e){}}

function aXP(n){const x=gXP()+n;localStorage.setItem('atoc_xp',JSON.stringify({xp:x}));const el=document.getElementById('hud-xp');if(el)el.textContent=x;const f=document.createElement('div');f.className='xpf';f.textContent='+'+n+' XP';f.style.cssText='top:160px;right:18px';document.body.appendChild(f);setTimeout(()=>f.remove(),1800);}

function uStr(){const td=new Date().toDateString(),yd=new Date(Date.now()-86400000).toDateString();let d=JSON.parse(localStorage.getItem('atoc_streak')||'{"c":0,"l":""}');if(d.l===td)return d.c;d.c=d.l===yd?d.c+1:1;d.l=td;localStorage.setItem('atoc_streak',JSON.stringify(d));return d.c;}
function gStr(){return(JSON.parse(localStorage.getItem('atoc_streak')||'{"c":0}')).c||0;}

// ── GAME STATE ──
let _S={lives:3,score:0,ans:{},wrong:[],cons:0,timer:null,tLeft:15,tStats:{},sXP:0,fast:0,total:6,lkey:'',over:false};

function rHUD(){const h=document.getElementById('hud');if(!h)return;const hts=Array.from({length:3},(_,i)=>`<span id="h${i}"${i>=_S.lives?' class="lost"':''}>❤️</span>`).join('');h.innerHTML=`<div class="lv-r">${hts}</div><div class="tr"><svg width="42" height="42" viewBox="0 0 42 42"><circle class="tb2" cx="21" cy="21" r="17" fill="none" stroke="rgba(0,0,0,.09)" stroke-width="3"/><circle class="tf" id="t-arc" cx="21" cy="21" r="17" fill="none" stroke="#00c9a7" stroke-width="3" stroke-linecap="round" stroke-dasharray="113" stroke-dashoffset="0" style="transition:stroke-dashoffset 1s linear,stroke .3s"/></svg><div class="tn" id="t-n">15</div></div><div class="xp-h">💎 <span id="hud-xp">${gXP()}</span></div>`;}

function stTmr(q){stpTmr();_S.tLeft=15;uTUI(15);_S.timer=setInterval(()=>{_S.tLeft--;uTUI(_S.tLeft);if(_S.tLeft<=0){stpTmr();tOut(q);}},1000);}
function stpTmr(){clearInterval(_S.timer);_S.timer=null;}
function uTUI(s){const arc=document.getElementById('t-arc'),n=document.getElementById('t-n');if(!arc||!n)return;arc.style.strokeDashoffset=113*(1-s/15);arc.style.stroke=s<=5?'#ff4d6d':s<=8?'#ffb830':'#00c9a7';n.textContent=s;n.style.color=s<=5?'#ff4d6d':'var(--nv)';}

function tOut(q){if(_S.over||_S.ans[q])return;_S.ans[q]='T';document.querySelectorAll('#q'+q+'-o .opt').forEach(b=>b.disabled=true);const ck=window._cm&&window._cm[q];if(ck){const cb=document.getElementById('q'+q+'-'+ck);if(cb)cb.classList.add('ok');}const ep=document.getElementById('q'+q+'-e');if(ep)ep.classList.add('on');if(!_S.wrong.includes(q))_S.wrong.push(q);lLife(q);tReact('timeout','⏱️ Время вышло! Смотри ответ!');chkDone();}

function lLife(q){if(_S.lives<=0)return;_S.lives--;const h=document.getElementById('h'+_S.lives);if(h)h.classList.add('lost');if(!_S.wrong.includes(q)&&q)_S.wrong.push(q);snd(false);if(_S.lives===0){stpTmr();setTimeout(showGO,800);}}

function showGO(){_S.over=true;const go=document.getElementById('go');if(go)go.classList.add('on');tReact('no','💔 Жизни кончились! Попробуй снова!');}

function restartLesson(){_S={lives:3,score:0,ans:{},wrong:[],cons:0,timer:null,tLeft:15,tStats:{},sXP:0,fast:0,total:_S.total,lkey:_S.lkey,over:false};const go=document.getElementById('go');if(go)go.classList.remove('on');document.querySelectorAll('.opt').forEach(b=>{b.disabled=false;b.classList.remove('ok','no');});document.querySelectorAll('.expl').forEach(e=>e.classList.remove('on'));const sc=document.getElementById('sc');if(sc)sc.classList.remove('on');document.querySelector('.retry')?.remove();const pb=document.getElementById('pb');if(pb)pb.style.width='8%';rHUD();tReact('st');setTimeout(()=>stTmr(1),600);window.scrollTo({top:0,behavior:'smooth'});}

// ── ANSWER ──
function dlA(q,ch,ck,tag){if(_S.ans[q]||_S.over)return;const fast=_S.tLeft>=10;stpTmr();_S.ans[q]=ch;document.querySelectorAll('#q'+q+'-o .opt').forEach(b=>b.disabled=true);const chosen=document.getElementById('q'+q+'-'+ch),corBtn=document.getElementById('q'+q+'-'+ck);const isOk=ch===ck;if(!_S.tStats[tag])_S.tStats[tag]={ok:0,total:0};_S.tStats[tag].total++;if(isOk){chosen.classList.add('ok');_S.score++;_S.cons++;_S.tStats[tag].ok++;const xp=10+(fast?5:0);aXP(xp);if(fast)_S.fast++;if(_S.cons>=3)tReact('str');else tReact('ok');if(_S.score===_S.total)boom();}else{chosen.classList.add('no');corBtn.classList.add('ok');_S.cons=0;lLife(q);tReact('no');}const ep=document.getElementById('q'+q+'-e');if(ep)ep.classList.add('on');const done=Object.keys(_S.ans).length;const pb=document.getElementById('pb');if(pb)pb.style.width=(8+done/_S.total*87)+'%';if(!_S.over){const nq=q+1;if(nq<=_S.total&&!_S.ans[nq])setTimeout(()=>stTmr(nq),900);}chkDone();}

function chkDone(){if(Object.keys(_S.ans).length===_S.total&&!_S.over)setTimeout(finSes,600);}

function finSes(){if(_S.wrong.length>0&&!_S._ret)showRetry();else showScore();}

function showRetry(){const bar=document.createElement('div');bar.className='retry';bar.innerHTML=`🔁 ${_S.wrong.length} ошибки! <button class="rb" onclick="doRetry()">Повторить!</button><button class="sk" onclick="skipR()">Пропустить</button>`;const sc=document.getElementById('sc');if(sc)sc.before(bar);}
function doRetry(){_S._ret=true;document.querySelector('.retry')?.remove();const tr=[..._S.wrong];_S.wrong=[];tr.forEach(q=>{delete _S.ans[q];document.querySelectorAll('#q'+q+'-o .opt').forEach(b=>{b.disabled=false;b.classList.remove('ok','no');});const ep=document.getElementById('q'+q+'-e');if(ep)ep.classList.remove('on');});_S.lives=3;for(let i=0;i<3;i++){const h=document.getElementById('h'+i);if(h)h.classList.remove('lost');}tReact('st','🔄 Повторяем! Тигрёнок верит! 🐯💪');setTimeout(()=>stTmr(tr[0]),500);}
function skipR(){_S._ret=true;document.querySelector('.retry')?.remove();showScore();}

function showScore(){const sc=document.getElementById('sc');if(!sc)return;sc.classList.add('on');const pct=Math.round(_S.score/_S.total*100);const em=['😿','🐱','🐯','🐯💪','🐯🔥','🐯🏆'];const ms=['Повтори теорию 💪','Хорошее начало! 📚','Неплохо! 🎯','Хорошо! 👍','Отлично! 🐯✨','ИДЕАЛЬНО! 🐯🏆🎉'];const idx=Math.min(Math.floor(_S.score/_S.total*5),5);const em2=document.getElementById('sc-em');if(em2)em2.textContent=em[idx];const sn=document.getElementById('sc-n');if(sn)sn.textContent=_S.score+'/'+_S.total;const sb=document.getElementById('sc-b');if(sb)sb.style.width=pct+'%';const sm2=document.getElementById('sc-m');if(sm2)sm2.textContent=ms[idx];const ss=document.getElementById('sc-str');if(ss)ss.textContent=uStr();const sx=document.getElementById('sc-xp');if(sx)sx.textContent='+'+_S.sXP;rTS();localStorage.setItem(_S.lkey,JSON.stringify({score:_S.score,max:_S.total,pct,date:new Date().toISOString()}));tReact('dn');sc.scrollIntoView({behavior:'smooth',block:'center'});}

function rTS(){const el=document.getElementById('ts');if(!el)return;const colors={g:'#845ec2',v:'#00c9a7',t:'#ffb830'};const lbls={g:'Grammar',v:'Vocabulary',t:'Test'};let html='<div class="ts">';for(const[t,d]of Object.entries(_S.tStats)){if(!d.total)continue;const pct=Math.round(d.ok/d.total*100);html+=`<div class="ts-i"><div class="ts-l">${lbls[t]||t}</div><div class="ts-bw"><div class="ts-bf" style="width:${pct}%;background:${colors[t]||'#00c9a7'}"></div></div><div class="ts-n">${d.ok}/${d.total} (${pct}%)</div></div>`;}html+='</div>';el.innerHTML=html;}

function showTab(id,el){document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));const s=document.getElementById('t-'+id);if(s)s.classList.add('on');if(el)el.classList.add('on');window.scrollTo({top:0,behavior:'smooth'});}

const A0O=['ielts_a0_lesson1','ielts_a0_lesson2','ielts_a0_lesson3','ielts_a0_lesson4','ielts_a0_lesson5','ielts_a0_lesson6','ielts_a0_lesson7','ielts_a0_lesson8'];
function isUL(k){const i=A0O.indexOf(k);if(i<=0)return true;return!!JSON.parse(localStorage.getItem(A0O[i-1])||'null');}

  const eL=document.getElementById('eLG'),eR=document.getElementById('eRG');

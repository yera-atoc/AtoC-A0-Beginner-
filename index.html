<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AtoC · IELTS from Zero</title>

<style>
body {
  visibility: hidden; /* 👈 скрываем до проверки */
  font-family: sans-serif;
  background: #04080f;
  color: white;
}
</style>
</head>

<body>

<h1>AtoC · IELTS from Zero</h1>
<p id="status">Загрузка...</p>

<button id="logout">Выйти</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="firebase_core.js"></script>

<script>
// 🔥 ГЛАВНАЯ ЛОГИКА (НОВАЯ АРХИТЕКТУРА)

async function startApp() {
  try {
    const user = await ATOC.AUTH.getCurrentUser();

    if (!user) {
      window.location.href = 'auth.html';
      return;
    }

    const hasAccess = await ATOC.ACCESS.check('a0');

    if (!hasAccess) {
      window.location.href = 'payment_a0.html';
      return;
    }

    // загрузка данных
    const data = await ATOC.PROGRESS.load();

    if (data) {
      document.getElementById('status').textContent =
        "XP: " + (data.xp || 0) + " | Streak: " + (data.streak || 0);
    }

    await ATOC.PROGRESS.updateStreak();

    // показываем сайт
    document.body.style.visibility = 'visible';

  } catch (e) {
    console.error(e);
    document.getElementById('status').textContent = "Ошибка загрузки";
    document.body.style.visibility = 'visible';
  }
}

// logout
document.getElementById('logout').onclick = () => {
  if (confirm('Выйти из аккаунта?')) {
    ATOC.AUTH.logout().then(() => {
      window.location.href = 'auth.html';
    });
  }
};

window.addEventListener('load', startApp);
</script>

</body>
</html>
